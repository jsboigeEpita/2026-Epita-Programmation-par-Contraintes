<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Delivery — CP-SAT</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; background: #0f1117; color: #e0e0e0; }

    #sidebar {
      width: 340px; min-width: 280px; background: #1a1d27;
      display: flex; flex-direction: column; overflow-y: auto;
      border-right: 1px solid #2e3148;
    }

    #sidebar header {
      padding: 18px 20px 12px;
      background: #13151f;
      border-bottom: 1px solid #2e3148;
    }
    #sidebar header h1 { font-size: 1.1rem; color: #7c83fd; letter-spacing: 0.5px; }
    #sidebar header p { font-size: 0.75rem; color: #888; margin-top: 3px; }

    .section { padding: 14px 16px; border-bottom: 1px solid #2e3148; }
    .section h2 { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1px; color: #7c83fd; margin-bottom: 10px; }

    .row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
    label { font-size: 0.78rem; color: #aaa; width: 120px; flex-shrink: 0; }
    input[type=number], input[type=range] {
      flex: 1; background: #252839; border: 1px solid #3a3f5c;
      border-radius: 6px; color: #e0e0e0; padding: 5px 8px; font-size: 0.82rem;
    }
    input[type=range] { padding: 0; cursor: pointer; }
    .val { font-size: 0.8rem; color: #7c83fd; width: 36px; text-align: right; }

    .mode-btns { display: flex; gap: 6px; margin-bottom: 8px; }
    .mode-btn {
      flex: 1; padding: 7px 4px; border: 1px solid #3a3f5c; border-radius: 6px;
      background: #252839; color: #ccc; cursor: pointer; font-size: 0.78rem; text-align: center;
      transition: all 0.15s;
    }
    .mode-btn.active { background: #7c83fd; border-color: #7c83fd; color: #fff; }
    .mode-btn:hover:not(.active) { border-color: #7c83fd; color: #7c83fd; }

    #btn-solve {
      margin: 14px 16px; padding: 12px;
      background: #7c83fd; border: none; border-radius: 8px;
      color: #fff; font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    #btn-solve:hover { background: #5c64e8; }
    #btn-solve:disabled { background: #3a3f5c; cursor: not-allowed; }

    #btn-generate {
      margin: 0 16px 10px; padding: 8px;
      background: transparent; border: 1px solid #3a3f5c; border-radius: 8px;
      color: #aaa; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    #btn-generate:hover { border-color: #7c83fd; color: #7c83fd; }

    #btn-clear {
      margin: 0 16px 14px; padding: 8px;
      background: transparent; border: 1px solid #3a3f5c; border-radius: 8px;
      color: #aaa; font-size: 0.82rem; cursor: pointer; transition: all 0.2s;
    }
    #btn-clear:hover { border-color: #e05c5c; color: #e05c5c; }

    #status-box {
      margin: 0 16px 14px; padding: 10px 12px;
      background: #252839; border-radius: 8px; font-size: 0.8rem;
      display: none;
    }
    #status-box.ok { border-left: 3px solid #4ade80; }
    #status-box.warn { border-left: 3px solid #f59e0b; }
    #status-box.err { border-left: 3px solid #e05c5c; }
    #status-box .stat-line { display: flex; justify-content: space-between; margin-bottom: 4px; }
    #status-box .stat-val { color: #7c83fd; font-weight: 600; }

    .route-item {
      padding: 8px 10px; border-radius: 6px; margin-bottom: 6px;
      background: #252839; font-size: 0.78rem;
    }
    .route-item .route-header { display: flex; justify-content: space-between; margin-bottom: 4px; }
    .route-item .drone-label { font-weight: 600; }
    .route-badge {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 0.7rem; font-weight: 600;
    }
    .route-item .stops { color: #888; line-height: 1.6; }

    #map { flex: 1; }

    .leaflet-draw-toolbar a { background-color: #1a1d27 !important; color: #ccc !important; }

    #mode-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(26,29,39,0.92); border: 1px solid #3a3f5c;
      padding: 8px 16px; border-radius: 20px; font-size: 0.8rem; color: #ccc;
      pointer-events: none; z-index: 1000; display: none;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <header>
    <h1>Drone Delivery — CP-SAT</h1>
    <p>Routing par programmation par contraintes</p>
  </header>

  <div class="section">
    <h2>Mode édition</h2>
    <div class="mode-btns">
      <div class="mode-btn active" data-mode="depot">📍 Dépôt</div>
      <div class="mode-btn" data-mode="client">📦 Client</div>
      <div class="mode-btn" data-mode="zone">🚫 Zone</div>
    </div>
    <div class="row" style="font-size:0.75rem;color:#666;">Cliquer sur la carte pour placer</div>
  </div>

  <div class="section">
    <h2>Paramètres client</h2>
    <div class="row">
      <label>Poids (kg)</label>
      <input type="range" id="client-weight" min="0.5" max="10" step="0.5" value="2" />
      <span class="val" id="client-weight-val">2</span>
    </div>
    <div class="row">
      <label>Volume (L)</label>
      <input type="range" id="client-volume" min="1" max="20" step="1" value="5" />
      <span class="val" id="client-volume-val">5</span>
    </div>
    <div class="row">
      <label>Priorité</label>
      <input type="range" id="client-priority" min="1" max="3" step="1" value="1" />
      <span class="val" id="client-priority-val">1</span>
    </div>
  </div>

  <div class="section">
    <h2>Drones</h2>
    <div class="row">
      <label>Nombre</label>
      <input type="number" id="drone-count" value="3" min="1" max="10" />
    </div>
    <div class="row">
      <label>Autonomie (km)</label>
      <input type="number" id="drone-range" value="30" min="5" max="100" />
    </div>
    <div class="row">
      <label>Charge max (kg)</label>
      <input type="number" id="drone-weight" value="10" min="1" max="50" />
    </div>
    <div class="row">
      <label>Volume max (L)</label>
      <input type="number" id="drone-volume" value="30" min="5" max="100" />
    </div>
  </div>

  <div class="section">
    <h2>Météo</h2>
    <div class="row">
      <label>Facteur vent</label>
      <input type="range" id="wind-factor" min="0.5" max="1.0" step="0.05" value="1.0" />
      <span class="val" id="wind-factor-val">1.0</span>
    </div>
  </div>

  <div class="section">
    <h2>Instance aléatoire</h2>
    <div class="row">
      <label>Clients</label>
      <input type="number" id="gen-clients" value="10" min="1" max="50" />
    </div>
    <div class="row">
      <label>Seed</label>
      <input type="number" id="gen-seed" value="42" />
    </div>
  </div>

  <button id="btn-generate">⚡ Générer instance</button>
  <button id="btn-clear">🗑 Tout effacer</button>
  <button id="btn-solve">Résoudre</button>

  <div id="status-box"></div>

  <div class="section" id="routes-section" style="display:none;">
    <h2>Routes</h2>
    <div id="routes-list"></div>
  </div>
</div>

<div id="map"></div>
<div id="mode-hint"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script>
const API = '';  // même origine

// --- Map init ---
const map = L.map('map', { center: [48.8566, 2.3522], zoom: 12 });
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; Carto', maxZoom: 19
}).addTo(map);

// --- State ---
let mode = 'depot';
let depotMarker = null;
let clientMarkers = [];
let zonePolygons = [];
let routeLayers = [];
let zonePoints = [];
let zoneTempMarkers = [];
let clientIdCounter = 1;

const DRONE_COLORS = ['#7c83fd', '#4ade80', '#f59e0b', '#e05c5c', '#22d3ee',
                      '#f472b6', '#a78bfa', '#34d399', '#fbbf24', '#60a5fa'];

// --- Icons ---
function depotIcon() {
  return L.divIcon({ html: '🏠', className: '', iconSize: [28, 28], iconAnchor: [14, 14] });
}
function clientIcon(priority) {
  const colors = { 1: '#888', 2: '#f59e0b', 3: '#e05c5c' };
  const c = colors[priority] || '#888';
  return L.divIcon({
    html: `<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2px solid #fff;"></div>`,
    className: '', iconSize: [14, 14], iconAnchor: [7, 7]
  });
}

// --- Mode buttons ---
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    if (mode !== 'zone') finishZone();
    showHint();
  });
});

function showHint() {
  const hints = {
    depot: 'Cliquer pour placer le dépôt',
    client: 'Cliquer pour ajouter un client',
    zone: 'Cliquer pour dessiner une zone interdite (double-clic pour finir)',
  };
  const el = document.getElementById('mode-hint');
  el.textContent = hints[mode] || '';
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}

// --- Sliders ---
function bindSlider(id, valId) {
  const input = document.getElementById(id);
  const val = document.getElementById(valId);
  val.textContent = input.value;
  input.addEventListener('input', () => val.textContent = parseFloat(input.value).toFixed(
    id === 'wind-factor' ? 2 : 0
  ));
}
bindSlider('client-weight', 'client-weight-val');
bindSlider('client-volume', 'client-volume-val');
bindSlider('client-priority', 'client-priority-val');
bindSlider('wind-factor', 'wind-factor-val');

// --- Map click ---
map.on('click', e => {
  const { lat, lng } = e.latlng;

  if (mode === 'depot') {
    if (depotMarker) map.removeLayer(depotMarker);
    depotMarker = L.marker([lat, lng], { icon: depotIcon(), draggable: true }).addTo(map);
    depotMarker.bindTooltip('Dépôt', { permanent: false });

  } else if (mode === 'client') {
    const priority = parseInt(document.getElementById('client-priority').value);
    const weight = parseFloat(document.getElementById('client-weight').value);
    const volume = parseFloat(document.getElementById('client-volume').value);
    const id = clientIdCounter++;
    const m = L.marker([lat, lng], { icon: clientIcon(priority), draggable: true }).addTo(map);
    m.bindTooltip(`#${id} — ${weight}kg ${volume}L p${priority}`, { permanent: false });
    m._clientData = { id, lat, lng, weight, volume, priority };
    clientMarkers.push(m);

  } else if (mode === 'zone') {
    zonePoints.push([lat, lng]);
    const tm = L.circleMarker([lat, lng], { radius: 5, color: '#e05c5c', fillOpacity: 0.8 }).addTo(map);
    zoneTempMarkers.push(tm);
  }
});

map.on('dblclick', e => {
  if (mode === 'zone' && zonePoints.length >= 3) {
    finishZone();
  }
});

function finishZone() {
  if (zonePoints.length >= 3) {
    const poly = L.polygon(zonePoints, {
      color: '#e05c5c', fillColor: '#e05c5c', fillOpacity: 0.2,
      dashArray: '6 4',
    }).addTo(map);
    poly.bindTooltip('Zone interdite', { permanent: false });
    poly._zoneData = { points: [...zonePoints] };
    zonePolygons.push(poly);
  }
  zonePoints = [];
  zoneTempMarkers.forEach(m => map.removeLayer(m));
  zoneTempMarkers = [];
}

// --- Clear ---
document.getElementById('btn-clear').addEventListener('click', () => {
  if (depotMarker) { map.removeLayer(depotMarker); depotMarker = null; }
  clientMarkers.forEach(m => map.removeLayer(m)); clientMarkers = [];
  zonePolygons.forEach(p => map.removeLayer(p)); zonePolygons = [];
  routeLayers.forEach(l => map.removeLayer(l)); routeLayers = [];
  clientIdCounter = 1;
  document.getElementById('status-box').style.display = 'none';
  document.getElementById('routes-section').style.display = 'none';
});

// --- Generate ---
document.getElementById('btn-generate').addEventListener('click', async () => {
  const n = document.getElementById('gen-clients').value;
  const seed = document.getElementById('gen-seed').value;
  const center = map.getCenter();
  const zoom = map.getZoom();
  const radius = Math.max(2, Math.min(50, 200 / zoom));

  const res = await fetch(`${API}/generate?n_clients=${n}&n_drones=${document.getElementById('drone-count').value}&seed=${seed}&center_lat=${center.lat}&center_lng=${center.lng}&radius_km=${radius}`);
  const data = await res.json();

  // Clear existing
  if (depotMarker) { map.removeLayer(depotMarker); depotMarker = null; }
  clientMarkers.forEach(m => map.removeLayer(m)); clientMarkers = [];
  zonePolygons.forEach(p => map.removeLayer(p)); zonePolygons = [];
  routeLayers.forEach(l => map.removeLayer(l)); routeLayers = [];

  // Place depot
  const dp = data.depot.position;
  depotMarker = L.marker([dp.lat, dp.lng], { icon: depotIcon(), draggable: true }).addTo(map);
  depotMarker.bindTooltip('Dépôt');

  // Place clients
  clientIdCounter = 1;
  data.clients.forEach(c => {
    const m = L.marker([c.position.lat, c.position.lng], {
      icon: clientIcon(c.priority), draggable: true
    }).addTo(map);
    m.bindTooltip(`#${c.id} — ${c.weight}kg ${c.volume}L p${c.priority}`);
    m._clientData = { id: c.id, lat: c.position.lat, lng: c.position.lng, weight: c.weight, volume: c.volume, priority: c.priority };
    clientMarkers.push(m);
    clientIdCounter = Math.max(clientIdCounter, c.id + 1);
  });

  // Place zones
  data.forbidden_zones.forEach((z, idx) => {
    const pts = z.polygon.map(p => [p.lat, p.lng]);
    const poly = L.polygon(pts, { color: '#e05c5c', fillColor: '#e05c5c', fillOpacity: 0.2, dashArray: '6 4' }).addTo(map);
    poly.bindTooltip(z.label || `Zone ${idx + 1}`);
    poly._zoneData = { points: pts };
    zonePolygons.push(poly);
  });

  // Sync drone params from generated
  if (data.drones.length > 0) {
    document.getElementById('drone-count').value = data.drones.length;
    document.getElementById('drone-range').value = Math.round(data.drones[0].max_range);
    document.getElementById('drone-weight').value = Math.round(data.drones[0].max_weight);
    document.getElementById('drone-volume').value = Math.round(data.drones[0].max_volume);
  }

  document.getElementById('routes-section').style.display = 'none';
  document.getElementById('status-box').style.display = 'none';
});

// --- Solve ---
document.getElementById('btn-solve').addEventListener('click', async () => {
  if (!depotMarker) return alert('Placez le dépôt d\'abord.');
  if (clientMarkers.length === 0) return alert('Ajoutez au moins un client.');

  const btn = document.getElementById('btn-solve');
  btn.disabled = true;
  btn.textContent = 'Résolution…';

  routeLayers.forEach(l => map.removeLayer(l));
  routeLayers = [];

  const dp = depotMarker.getLatLng();
  const nDrones = parseInt(document.getElementById('drone-count').value);
  const dRange = parseFloat(document.getElementById('drone-range').value);
  const dWeight = parseFloat(document.getElementById('drone-weight').value);
  const dVolume = parseFloat(document.getElementById('drone-volume').value);
  const wind = parseFloat(document.getElementById('wind-factor').value);

  const payload = {
    depot: { position: { lat: dp.lat, lng: dp.lng } },
    clients: clientMarkers.map((m, i) => {
      const d = m._clientData;
      const pos = m.getLatLng();
      return { id: d.id, position: { lat: pos.lat, lng: pos.lng }, weight: d.weight, volume: d.volume, priority: d.priority };
    }),
    drones: Array.from({ length: nDrones }, (_, i) => ({
      id: i + 1, max_range: dRange, max_weight: dWeight, max_volume: dVolume, speed: 60
    })),
    forbidden_zones: zonePolygons.map((p, i) => ({
      id: i + 1,
      label: `Zone ${i + 1}`,
      polygon: p._zoneData.points.map(pt => Array.isArray(pt) ? { lat: pt[0], lng: pt[1] } : pt)
    })),
    weather: { wind_factor: wind, rain: false },
    time_limit_seconds: 30,
  };

  try {
    const res = await fetch(`${API}/solve`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    renderResult(data, payload.depot.position);
  } catch (e) {
    showStatus('Erreur réseau : ' + e.message, 'err');
  }

  btn.disabled = false;
  btn.textContent = 'Résoudre';
});

function renderResult(data, depotPos) {
  const box = document.getElementById('status-box');
  box.style.display = 'block';

  const statusClass = data.status === 'OPTIMAL' ? 'ok' : data.status === 'FEASIBLE' ? 'warn' : 'err';
  box.className = statusClass;

  const served = data.routes.reduce((s, r) => s + r.stops.length, 0);
  box.innerHTML = `
    <div class="stat-line"><span>Statut</span><span class="stat-val">${data.status}</span></div>
    <div class="stat-line"><span>Livraisons</span><span class="stat-val">${served} / ${served + data.unserved_clients.length}</span></div>
    <div class="stat-line"><span>Distance totale</span><span class="stat-val">${data.total_distance} km</span></div>
    <div class="stat-line"><span>Temps solver</span><span class="stat-val">${data.solve_time_seconds}s</span></div>
    ${data.unserved_clients.length ? `<div style="color:#f59e0b;margin-top:4px;font-size:0.75rem;">⚠ Non livrés : #${data.unserved_clients.join(', #')}</div>` : ''}
  `;

  const routesList = document.getElementById('routes-list');
  routesList.innerHTML = '';
  document.getElementById('routes-section').style.display = 'block';

  data.routes.forEach((route, idx) => {
    if (route.stops.length === 0) return;
    const color = DRONE_COLORS[idx % DRONE_COLORS.length];

    // Draw route on map
    const pts = [[depotPos.lat, depotPos.lng]];
    route.stops.forEach(s => pts.push([s.position.lat, s.position.lng]));
    pts.push([depotPos.lat, depotPos.lng]);

    const line = L.polyline(pts, { color, weight: 3, opacity: 0.85 }).addTo(map);
    routeLayers.push(line);

    route.stops.forEach(s => {
      const c = L.circleMarker([s.position.lat, s.position.lng], {
        radius: 8, color, fillColor: color, fillOpacity: 0.7, weight: 2
      }).addTo(map);
      c.bindTooltip(`Drone ${route.drone_id} → #${s.client_id} (${s.cumulative_distance}km)`, { permanent: false });
      routeLayers.push(c);
    });

    // Sidebar card
    const item = document.createElement('div');
    item.className = 'route-item';
    item.style.borderLeft = `3px solid ${color}`;
    item.innerHTML = `
      <div class="route-header">
        <span class="drone-label" style="color:${color}">Drone ${route.drone_id}</span>
        <span class="route-badge" style="background:${color}22;color:${color}">${route.stops.length} stops</span>
      </div>
      <div class="stops">
        📍 Dépôt → ${route.stops.map(s => `#${s.client_id}`).join(' → ')} → 📍<br/>
        🔋 ${route.battery_remaining}% | ${route.total_distance}km | ${route.total_weight}kg
      </div>
    `;
    routesList.appendChild(item);
  });
}

function showStatus(msg, cls) {
  const box = document.getElementById('status-box');
  box.style.display = 'block';
  box.className = cls;
  box.textContent = msg;
}
</script>
</body>
</html>
