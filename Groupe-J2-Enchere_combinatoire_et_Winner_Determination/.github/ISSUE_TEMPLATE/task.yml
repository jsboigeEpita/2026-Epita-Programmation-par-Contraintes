name: Task
description: Standard project task (owner, reviewer, sprint, deadline)
title: "[Sprint N] <short title>"
labels: ["task"]
body:
  - type: input
    id: owner
    attributes:
      label: Owner
      description: Who implements this
      placeholder: "@Sosolalt"
    validations:
      required: true
  - type: input
    id: reviewer
    attributes:
      label: Reviewer
      description: Who reviews and approves
      placeholder: "@NCH04"
    validations:
      required: true
  - type: input
    id: sprint
    attributes:
      label: Sprint
      placeholder: "S1"
    validations:
      required: true
  - type: input
    id: deadline
    attributes:
      label: Deadline
      placeholder: "2026-05-02"
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in / out of scope
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] ..."
    validations:
      required: true
