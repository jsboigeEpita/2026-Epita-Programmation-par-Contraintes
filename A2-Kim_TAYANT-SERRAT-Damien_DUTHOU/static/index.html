<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diet Planner - CP-SAT</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            ink: { 950: '#0b0f0d', 900: '#111815', 800: '#1a2520' },
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; height: 6px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
    @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { transform: translateY(8px); } }
    .pulse-dot::before {
      content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: currentColor; margin-right: 6px;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-stone-50 via-emerald-50/40 to-amber-50/40 min-h-screen text-ink-950">

  <!-- Header -->
  <header class="border-b border-stone-200/80 bg-white/70 backdrop-blur sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center text-white font-bold text-lg shadow-sm">
          ⊕
        </div>
        <div>
          <h1 class="font-bold text-lg leading-tight">Diet Planner</h1>
          <p class="text-xs text-stone-500">CP-SAT · OR-Tools · Ciqual 2025</p>
        </div>
      </div>
      <div class="text-xs text-stone-400 hidden md:flex items-center gap-2">
        <span class="text-emerald-600 pulse-dot"></span>
        <span id="api-status">connexion…</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">

    <!-- Sidebar form -->
    <aside class="lg:col-span-4 xl:col-span-3">
      <div class="bg-white rounded-2xl border border-stone-200 shadow-sm p-6 sticky top-24">
        <h2 class="font-bold text-lg mb-1">Paramètres</h2>
        <p class="text-sm text-stone-500 mb-6">Configure ta semaine.</p>

        <form id="menu-form" class="space-y-5">
          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="text-xs font-medium text-stone-600 uppercase tracking-wide">Jours</label>
              <input type="number" name="days" value="7" min="1" max="14"
                     class="mt-1 w-full px-3 py-2 rounded-lg border border-stone-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
            </div>
            <div>
              <label class="text-xs font-medium text-stone-600 uppercase tracking-wide">Repas/jour</label>
              <input type="number" name="meals_per_day" value="2" min="1" max="4"
                     class="mt-1 w-full px-3 py-2 rounded-lg border border-stone-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
            </div>
          </div>

          <div>
            <label class="text-xs font-medium text-stone-600 uppercase tracking-wide flex items-center justify-between">
              <span>Budget total</span>
              <span id="budget-display" class="text-emerald-700 font-semibold">30 €</span>
            </label>
            <input type="range" name="budget_eur" min="10" max="200" value="30" step="5"
                   class="mt-2 w-full accent-emerald-600" id="budget-slider" />
            <div class="flex justify-between text-[10px] text-stone-400 mt-1">
              <span>10 €</span><span>200 €</span>
            </div>
          </div>

          <div>
            <label class="text-xs font-medium text-stone-600 uppercase tracking-wide">Seed (optionnel)</label>
            <input type="number" name="seed" placeholder="ex: 42"
                   class="mt-1 w-full px-3 py-2 rounded-lg border border-stone-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
          </div>

          <label class="flex items-center gap-3 cursor-pointer group">
            <input type="checkbox" name="vegetarian" class="peer sr-only" />
            <span class="w-10 h-6 rounded-full bg-stone-300 peer-checked:bg-emerald-600 transition relative
                         after:absolute after:top-0.5 after:left-0.5 after:w-5 after:h-5 after:rounded-full after:bg-white after:transition
                         peer-checked:after:translate-x-4"></span>
            <span class="text-sm font-medium">Végétarien</span>
          </label>

          <div>
            <label class="text-xs font-medium text-stone-600 uppercase tracking-wide">Aliments à exclure</label>
            <div class="relative mt-1">
              <input type="text" id="exclude-search" placeholder="Tape pour rechercher…"
                     class="w-full px-3 py-2 rounded-lg border border-stone-300 focus:border-emerald-500 focus:ring-2 focus:ring-emerald-500/20 outline-none transition" />
              <div id="exclude-suggestions" class="hidden absolute left-0 right-0 top-full mt-1 bg-white border border-stone-200 rounded-lg shadow-lg max-h-56 overflow-y-auto scrollbar-thin z-30"></div>
            </div>
            <div id="exclude-chips" class="flex flex-wrap gap-1.5 mt-2"></div>
          </div>

          <button type="submit" id="generate-btn"
                  class="w-full py-3 rounded-xl bg-gradient-to-br from-emerald-600 to-emerald-700 hover:from-emerald-500 hover:to-emerald-600 text-white font-semibold shadow-md hover:shadow-lg transition disabled:opacity-60 disabled:cursor-not-allowed">
            <span id="generate-label">Générer le menu</span>
          </button>
        </form>
      </div>
    </aside>

    <!-- Results -->
    <section class="lg:col-span-8 xl:col-span-9">
      <div id="empty-state" class="bg-white/60 border-2 border-dashed border-stone-300 rounded-2xl p-12 text-center">
        <div class="text-5xl mb-4">🥗</div>
        <h3 class="font-semibold text-stone-700 text-lg">Aucun menu généré</h3>
        <p class="text-stone-500 text-sm mt-1">Ajuste les paramètres et clique sur <span class="font-medium text-emerald-700">Générer</span>.</p>
      </div>

      <div id="loading-state" class="hidden bg-white rounded-2xl border border-stone-200 p-12 text-center">
        <div class="inline-block w-12 h-12 border-4 border-emerald-200 border-t-emerald-600 rounded-full animate-spin"></div>
        <p class="text-stone-600 mt-4 font-medium">Le solveur travaille…</p>
        <p class="text-stone-400 text-sm">CP-SAT optimise chaque repas, peut prendre quelques secondes.</p>
      </div>

      <div id="error-state" class="hidden bg-red-50 border border-red-200 rounded-2xl p-6">
        <h3 class="font-semibold text-red-800">Erreur</h3>
        <p id="error-message" class="text-red-700 text-sm mt-1"></p>
      </div>

      <div id="results" class="hidden"></div>
    </section>

  </main>

  <footer class="max-w-7xl mx-auto px-6 py-8 text-center text-xs text-stone-400">
   
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
